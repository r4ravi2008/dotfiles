# =============================================================================
# Declarative Package Registry for bootstrap.sh
# =============================================================================
#
# Each non-comment, non-blank line defines a package to install.
# Fields are pipe-delimited (leading/trailing whitespace is trimmed):
#
#   command | group | brew | apt | dnf | pacman | zypper | fallback
#
# command   – the binary name to check with `command -v`
# group     – logical group (cli, container, cloud …); used to install subsets
# brew      – Homebrew formula name (macOS primary, Linux brew secondary)
# apt       – Debian/Ubuntu package name (use "-" if not available)
# dnf       – Fedora/RHEL package name
# pacman    – Arch Linux package name
# zypper    – openSUSE package name
# fallback  – name of a _fallback_<name> shell function for custom install logic
#             Use "-" if the system package manager is sufficient.
#
# The installer engine works as follows:
#   1. Collect all missing packages in the requested group(s)
#   2. On macOS: batch-install via `brew install <brew_names...>`
#   3. On Linux: batch-install via the detected package manager
#      - If distro pkg is "-", or the package manager install fails for that
#        package, fall back to the named fallback function (if not "-")
#   4. Packages with fallback="-" and distro pkg="-" emit a warning
#
# To add a new tool, just append a line here. No bootstrap.sh changes needed
# unless it requires a new _fallback_* function.
# =============================================================================

# ------ CLI tools ------
# command    | group | brew     | apt       | dnf       | pacman   | zypper   | fallback
zoxide       | cli   | zoxide   | zoxide    | zoxide    | zoxide   | zoxide   | zoxide
fzf          | cli   | fzf      | fzf       | fzf       | fzf      | fzf      | fzf
fd           | cli   | fd       | fd-find   | fd-find   | fd       | fd       | -
rg           | cli   | ripgrep  | ripgrep   | ripgrep   | ripgrep  | ripgrep  | -
lazygit      | cli   | lazygit  | -         | -         | lazygit  | -        | lazygit

# ------ Container tools ------
podman       | container | podman         | podman         | podman         | podman         | podman         | -
podman-compose | container | podman-compose | podman-compose | podman-compose | podman-compose | podman-compose | podman-compose

# ------ Cloud tools ------
aws          | cloud | awscli   | -         | -         | -        | -        | aws
